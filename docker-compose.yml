version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: did_auth_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: did_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ganache:
    image: trufflesuite/ganache:latest
    container_name: did_auth_blockchain
    ports:
      - "7545:8545"
    command: ["--wallet.deterministic"]

  ml_service:
    build: ./ml
    container_name: did_auth_ml
    ports:
      - "8000:8000"
    volumes:
      - ./ml/models:/app/models

  backend:
    build: ./backend
    container_name: did_auth_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/did_auth
      - RPC_URL=http://did_auth_blockchain:8545
      - ML_SERVICE_URL=http://ml_service:8000
      - CONTRACT_ADDRESS=0xe78A0F7E598Cc8b0Bb87894B0F60dD2a88d6a8Ab
      - PRIVATE_KEY=0x4f3edf983ac636a65a842ce7c78d9aa706d3b113bce9c46f30d7d21715b23b1d
    depends_on:
      - db
      - ml_service
      - ganache
    command: sh -c "sleep 15 && node scripts/migrate.js && node src/index.js"

  frontend:
    build: ./frontend
    container_name: did_auth_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: